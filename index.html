<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!--  layout responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="Discover MEHEK luxury fragrances inspired by Morocco, Pakistan, Italy and London."
    >

    <!-- Browser tab title -->
    <title>MEHEK Fragrances | Luxury Perfumes</title>

    <!-- Connection the external CSS file -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Load JavaScript -->
    <script src="js/script.js" defer></script>
</head>

<body>

    <!-- Allows keyboard users to skip the navigation -->
    <a class="skip-link" href="#main-content">
        Skip to main content
    </a>

   
    <!--Website Header-->
    <header class="site-header">

        <!-- Promotional announcement -->
        <div class="announcement-bar">
            <p>Complimentary UK shipping on orders over £100</p>
        </div>

        <!-- Main website navigation -->
        <nav class="navbar" aria-label="Main navigation">

            <!-- Mobile menu button -->
            <button
                class="menu-toggle"
                id="menu-toggle"
                type="button"
                aria-label="Open navigation menu"
                aria-controls="navigation-menu"
                aria-expanded="false"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Brand logo -->
            <a class="brand-logo" href="index.html" aria-label="MEHEK homepage">
                <span class="brand-name">MEHEK</span>
                <span class="brand-subtitle">Fragrances</span>
            </a>

            <!-- Main navigation links -->
            <ul class="navigation-menu" id="navigation-menu">
                <li>
                    <a class="active-link" href="index.html" aria-current="page">
                        Home
                    </a>
                </li>

                <li>
                    <a href="products.html">Shop</a>
                </li>

                <li>
                    <a href="products.html#collections">Collections</a>
                </li>

                <li>
                    <a href="about.html">About</a>
                </li>

                <li>
                    <a href="contact.html">Contact</a>
                </li>
            </ul>

            <!-- Navigation actions -->
            <div class="navigation-actions">

                <!-- Search link -->
                <a
                    class="icon-link"
                    href="products.html"
                    aria-label="Search products"
                >
                    <svg
                        aria-hidden="true"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                    >
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="16" y1="16" x2="21" y2="21"></line>
                    </svg>
                </a>

                <!-- Shopping cart link -->
                <a
                    class="icon-link cart-link"
                    href="cart.html"
                    aria-label="Open shopping cart"
                >
                    <svg
                        aria-hidden="true"
                        viewBox="0 0 24 24"
                        width="22"
                        height="22"
                    >
                        <path d="M3 4h2l2 11h10l2-8H6"></path>
                        <circle cx="9" cy="19" r="1"></circle>
                        <circle cx="17" cy="19" r="1"></circle>
                    </svg>

                    <!-- Updated later with JavaScript -->
                    <span class="cart-count" id="cart-count" aria-live="polite">
                        0
                    </span>
                </a>

            </div>

        </nav>

    </header>

    <!-- Temporary main content used while building the homepage -->
    <main id="main-content">
        <!--      Hero Section -->
        <section class="hero-section">

            <!-- Hero text content -->
            <div class="hero-content">

                <p class="hero-eyebrow">
                 Luxury Fragrance House
                </p>

                 <h1>
                    Where Heritage Meets Luxury
                </h1>

                <p class="hero-description">
                 Discover refined fragrances inspired by Morocco,
                 Pakistan, Italy and London.
                </p>

                <a class="hero-button" href="products.html">
                Explore Collection
                 </a>

            </div>

             <!-- Hero visual content -->
             <div class="hero-image-wrapper">

                 <img
                     class="hero-image"
                     src="media/images/hero/hero-perfume.webp"
                     alt="MEHEK luxury perfume displayed on soft cream fabric"
                     width="900"
                     height="700"
                >

             </div>

        </section>
    </main>

</body>

</html>
