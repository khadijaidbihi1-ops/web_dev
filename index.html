<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Shop Layout</title>
    <style>
        /* 
           CSS STYLES
           These control the look and feel of the page.
        */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
        }

        .product-card img {
            max-width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        .price {
            color: #e44d26;
            font-weight: bold;
        }

        /* CHANGE: Modify this button style to match your brand */
        .buy-button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <!-- CHANGE: Update your store name here -->
    <header>
        <h1>My Simplified Store</h1>
    </header>

    <div class="container">
        <h2>Our Products</h2>
        
        <div class="product-grid">
            
            <!-- PRODUCT START: Copy this block to add more products -->
            <div class="product-card">
                <!-- CHANGE: Replace with your product image URL -->
                <img src="https://via.placeholder.com/200" alt="Product Image">
                
                <!-- CHANGE: Update product title -->
                <h3>Product Name 1</h3>
                
                <!-- CHANGE: Update product price -->
                <p class="price">$19.99</p>
                
                <!-- CHANGE: Update the link URL to your checkout or product page -->
                <a href="#" class="buy-button">Buy Now</a>
            </div>
            <!-- PRODUCT END -->

            <!-- Example of a second product -->
            <div class="product-card">
                <img src="https://via.placeholder.com/200" alt="Product Image">
                <h3>Product Name 2</h3>
                <p class="price">$29.99</p>
                <a href="#" class="buy-button">Buy Now</a>
            </div>

        </div>
    </div>

</body>
</html>
</html>
