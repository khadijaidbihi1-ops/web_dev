<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Storefront</title>
    <style>
        /* CSS: Adjust global styles here */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f9f9f9; }
        
        /* Navigation Bar */
        nav { background: #222; color: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #fff; text-decoration: none; margin-left: 20px; }

        /* Hero Section */
        .hero { background: #333; color: white; padding: 50px; text-align: center; }

        /* Main Content */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        
        /* Card Design */
        .product-card { background: white; padding: 20px; border: 1px solid #eee; text-align: center; transition: 0.3s; }
        .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; }
        .price { font-size: 1.2rem; color: #b12704; margin: 10px 0; }
        
        /* Buttons */
        .btn { display: inline-block; padding: 10px 20px; background: #f0c14b; border: 1px solid #a88734; color: #111; text-decoration: none; border-radius: 3px; }
        
        /* Footer */
        footer { background: #222; color: #aaa; text-align: center; padding: 20px; margin-top: 50px; }
    </style>
</head>
<body>

    <!-- NAVIGATION: Change links to your social media or pages -->
    <nav>
        <div class="logo"><strong>MY SHOP</strong></div>
        <div>
            <a href="index.html">Home</a>
            <a href="#products">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- HERO SECTION: Change main banner text -->
    <section class="hero">
        <h1>Welcome to Our Store</h1>
        <p>Premium quality products delivered to your door.</p>
    </section>

    <div class="container" id="products">
        <h2>Featured Collection</h2>
        <div class="product-grid">
            
            <!-- PRODUCT ITEM: Add new items here -->
            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="Item">
                <h3>High-Quality Item</h3>
                <p class="price">$45.00</p>
                <a href="https://wa.me/YOUR_NUMBER" class="btn">Order via WhatsApp</a>
            </div>

            <div class="product-card">
                <img src="https://via.placeholder.com/250" alt="Item">
                <h3>Second Product</h3>
                <p class="price">$55.00</p>
                <a href="https://wa.me/YOUR_NUMBER" class="btn">Order via WhatsApp</a>
            </div>

        </div>
    </div>

    <!-- FOOTER: Update contact info -->
    <footer>
        <p>&copy; 2026 My Shop. All rights reserved.</p>
        <p>Follow us on <a href="#" style="color:white;">Instagram</a> | <a href="#" style="color:white;">Facebook</a></p>
    </footer>

</body>
</html>
